# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Release with mvn

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_DOCKERHUB_SECRETS: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
    steps:
    - uses: actions/checkout@v6
    -
      name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    -
      name: app version
      run: |
        echo "app_ver=$(mvn -B help:evaluate -Dexpression=project.version -q -DforceStdout)"
        echo "app_ver=$(mvn -B help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV

    -
      name: Set up QEMU
      if: ${{ env.HAS_DOCKERHUB_SECRETS == 'true' }}
      uses: docker/setup-qemu-action@v4

    -
      name: Set up Docker Buildx
      if: ${{ env.HAS_DOCKERHUB_SECRETS == 'true' }}
      uses: docker/setup-buildx-action@v4

# Docker hub action
    -
      name: Login to Docker Hub
      if: ${{ env.HAS_DOCKERHUB_SECRETS == 'true' }}
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    -
      name: Build with Maven
      run: mvn -B clean integration-test package assembly:single

    -
      name: Publish Docker image
      if: ${{ env.HAS_DOCKERHUB_SECRETS == 'true' }}
      run: mvn -B docker:build docker:push

# github_release:
    -
      name: github release
      if: ${{ ! endsWith( env.app_ver, '-SNAPSHOT' ) }}
      uses: ncipollo/release-action@v1
      with:
        artifacts: "./target/ApacheX-*.jar"
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ env.app_ver }}
        commit: "main"
        generateReleaseNotes: true

    -
      name: push latest if it's a release
      if: ${{ ! endsWith( env.app_ver, '-SNAPSHOT' ) && env.HAS_DOCKERHUB_SECRETS == 'true' }}
      run: docker buildx imagetools create docker.io/obsidiandynamics/apachex:$app_ver --tag docker.io/obsidiandynamics/apachex:latest
