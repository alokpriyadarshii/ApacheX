syntax = "proto3";

package ApacheX;

option java_multiple_files = true;
option java_package = "ApacheX.protos";
option java_outer_classname = "PersonProto";

message Person {
  string name = 1;
  int32 id = 2;
  string email = 3;
  enum Contact {
    TELEPHONE = 0;
    MOBILE = 1;
  }
  Contact contact = 4;
  repeated string data = 5;
}